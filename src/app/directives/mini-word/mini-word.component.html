<p
[style]="{
    color: color(),
    fontFamily: font(),
    fontSize: size() + 'px'
  }"
>mini-word works!</p>

<div class="row">
  <div class="col"><input [(ngModel)]="color" type="color" class="form-control" /></div>
  <div class="col"><input [(ngModel)]="size" type="number" class="form-control" /></div>
  <div class="col" appRainbow>
    <select [(ngModel)]="font" class="form-control">
      <option value="garamond">garamond</option>
      <option value="latin">latin</option>
      <option value="verdana">verdana</option>
    </select>
  </div>
</div>

<p appRainbow appHighlight>cc</p>
<p appHighlightNew [in]="'green'" [out]="'brown'">cc</p>

<input type="text" appRainbow>
