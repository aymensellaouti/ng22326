<!-- On a bindé l'attribut html style.backgroundColor
  avec l'attribut TS color
  Quand color change => le backgoundColor
  Change
-->
<p
  [style.backgroundColor]="color()"
>color : {{color()}}</p>

<!-- Quand le input change
 appelle la méthode changeColor
-->
<input
  #inputColor
  (change)="changeColor(inputColor)" type="text" class="form-control">

<button (click)="reset()" class="btn btn-danger">
  reset
</button>
