<h2>TTC Calculator</h2>

<div class="row">
  <div class="col">Prix HT<input [(ngModel)]="priceHt" type="number" class="form-control"></div>
  <div class="col">Quantité<input [(ngModel)]="qty" type="number" class="form-control"></div>
  <div class="col">TVA<input [(ngModel)]="taxe" type="number" class="form-control"></div>
</div>

<div class="row">
  <div class="col alert alert-primary">
    Prix Unitaire TTC: {{unitaireTtc() | currency}}
  </div>
  <div class="col alert alert-success">
    Prix Total TTC: {{totalTtc() | currency}}
  </div>
  <div class="col alert alert-danger">
    Discount: {{discount() | currency}}
  </div>
</div>

<p>{{1 | btc2usd |currency}}</p>
<p>{{1 | btc2usd:false }}</p>
